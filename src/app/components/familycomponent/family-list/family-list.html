<div class="container">
    <h2>Lista de Familias</h2>

    <form [formGroup]="filterForm" class="filtro-fechas">
        <mat-form-field appearance="outline" class="filtro-field">
            <mat-label>Fecha inicio</mat-label>
            <input matInput [matDatepicker]="pickerInicio" formControlName="fechaInicio">
            <mat-datepicker-toggle matSuffix [for]="pickerInicio"></mat-datepicker-toggle>
            <mat-datepicker #pickerInicio></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="filtro-field">
            <mat-label>Fecha fin</mat-label>
            <input matInput [matDatepicker]="pickerFin" formControlName="fechaFin">
            <mat-datepicker-toggle matSuffix [for]="pickerFin"></mat-datepicker-toggle>
            <mat-datepicker #pickerFin></mat-datepicker>
        </mat-form-field>

        <div class="filtro-btns">
            <button mat-stroked-button (click)="filtrar()">
                <mat-icon>search</mat-icon> Filtrar
            </button>
            <button mat-stroked-button (click)="limpiarFiltro()">
                <mat-icon>clear</mat-icon> Limpiar
            </button>
        </div>
    </form>

    <div class="acciones-familia">
        <button mat-raised-button color="primary" (click)="ingresarFamilia()">
            <mat-icon>group_add</mat-icon> Ingresar
        </button>
        <button mat-raised-button color="warn" (click)="salirFamilia()">
            <mat-icon>logout</mat-icon> Salir
        </button>
    </div>

    <div>
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <ng-container matColumnDef="c1">
                <th mat-header-cell *matHeaderCellDef>Nombre</th>
                <td mat-cell *matCellDef="let element">{{ element.nameFamily }}</td>
            </ng-container>

            <ng-container matColumnDef="c2">
                <th mat-header-cell *matHeaderCellDef>Fecha de creación</th>
                <td mat-cell *matCellDef="let element">{{ element.creationDate }}</td>
            </ng-container>

            <ng-container matColumnDef="c3">
                <th mat-header-cell *matHeaderCellDef>Acciones</th>
                <td mat-cell *matCellDef="let element">
                    <div style="display: flex; gap: 8px;">
                        <button matButton [routerLink]="['/families/update', element.idFamily]">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button matButton (click)="eliminar(element.idFamily)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 15]"></mat-paginator>
    </div>
</div>
