<mat-toolbar class="custom-toolbar">

  @if (verificar()) {

    <button mat-button [matMenuTriggerFor]="menu">
      <mat-icon>menu</mat-icon>
      Módulos
    </button>

    <span class="spacer"></span>

    <!-- USUARIO -->
    <button mat-button [matMenuTriggerFor]="menuUsuario">
      <mat-icon>person</mat-icon>
      Usuario
    </button>

  }

</mat-toolbar>

<!-- ===================== MENU PRINCIPAL ===================== -->

<mat-menu #menu="matMenu">

  <!-- ADMIN -->
  @if (isAdmin()) {

    <button mat-menu-item [matMenuTriggerFor]="rolMenu">
      <mat-icon>badge</mat-icon>
      Roles
    </button>

    <button mat-menu-item [matMenuTriggerFor]="userMenu">
      <mat-icon>people</mat-icon>
      Usuarios
    </button>

  }

  <!-- PADRE DE FAMILIA -->
  @if (isPadre()) {

    <button mat-menu-item [matMenuTriggerFor]="eventMenu">
      <mat-icon>event</mat-icon>
      Eventos
    </button>

    <button mat-menu-item [matMenuTriggerFor]="familyMenu">
      <mat-icon>groups</mat-icon>
      Familias
    </button>

  }

  <!-- TUTOR LEGAL -->
  @if (isTutor()) {

    <button mat-menu-item [matMenuTriggerFor]="gastoMenu">
      <mat-icon>payments</mat-icon>
      Tipo de Gasto
    </button>

    <button mat-menu-item>
      <mat-icon>category</mat-icon>
      Tipo de Acuerdo
    </button>

  }

  <!-- HIJO -->
  @if (isHijo()) {

    <button mat-menu-item>
      <mat-icon>school</mat-icon>
      Mis Actividades
    </button>

  }

</mat-menu>

<!-- ===================== MENU USUARIO ===================== -->

<mat-menu #menuUsuario="matMenu">

  <button mat-menu-item (click)="cerrar()">
    <mat-icon>logout</mat-icon>
    Cerrar sesión
  </button>

  <button mat-menu-item>
    <mat-icon>badge</mat-icon>
    Rol: {{ role }}
  </button>

</mat-menu>

<!-- ===================== TIPO DE GASTO ===================== -->

<mat-menu #gastoMenu="matMenu">
  <button mat-menu-item routerLink="/expensestype/listar">
    <mat-icon>list</mat-icon>
    Listar
  </button>

  <button mat-menu-item routerLink="/expensestype/register">
    <mat-icon>add</mat-icon>
    Registrar
  </button>
</mat-menu>

<!-- ===================== ROLES ===================== -->

<mat-menu #rolMenu="matMenu">
  <button mat-menu-item routerLink="/role/list">
    <mat-icon>list</mat-icon>
    Listar
  </button>
</mat-menu>

<!-- ===================== USUARIOS ===================== -->

<mat-menu #userMenu="matMenu">
  <button mat-menu-item routerLink="/users/insert">
    <mat-icon>add</mat-icon>
    Registrar
  </button>

  <button mat-menu-item routerLink="/users/list">
    <mat-icon>list</mat-icon>
    Listar
  </button>
</mat-menu>

<!-- ===================== EVENTOS ===================== -->

<mat-menu #eventMenu="matMenu">
  <button mat-menu-item routerLink="/events/insert">
    <mat-icon>add</mat-icon>
    Registrar
  </button>

  <button mat-menu-item routerLink="/events/list">
    <mat-icon>list</mat-icon>
    Listar
  </button>
</mat-menu>

<!-- ===================== FAMILIAS ===================== -->

<mat-menu #familyMenu="matMenu">
  <button mat-menu-item routerLink="/families/insert">
    <mat-icon>add</mat-icon>
    Registrar
  </button>

  <button mat-menu-item routerLink="/families/list">
    <mat-icon>list</mat-icon>
    Listar
  </button>
</mat-menu>
