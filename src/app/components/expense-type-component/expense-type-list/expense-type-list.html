<div class="container">
    <h2>Lista de Tipo de Acuerdo</h2>
    <div>
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">



            <!--- Note that these columns can be defined in any order.

    The actual rendered columns are set as a property on the row definition" -->



            <!-- Position Column -->

            <ng-container matColumnDef="c1">

                <th mat-header-cell *matHeaderCellDef> ID. </th>

                <td mat-cell *matCellDef="let element"> {{element.idExpenseType}} </td>


            </ng-container>



            <!-- Name Column -->

            <ng-container matColumnDef="c2">

                <th mat-header-cell *matHeaderCellDef> Tipo de Acuerdo </th>

                <td mat-cell *matCellDef="let element"> {{element.nameExpenseType}} </td>

            </ng-container>



            <!-- Weight Column -->

            <ng-container matColumnDef="c3">

                <th mat-header-cell *matHeaderCellDef> Descripción </th>

                <td mat-cell *matCellDef="let element"> {{element.descriptionExpenseType}} </td>

            </ng-container>


            <ng-container matColumnDef="c4">

                <th mat-header-cell *matHeaderCellDef> Eliminar </th>

                <td mat-cell *matCellDef="let element"> 
                <button matMiniFab color="warn" aria-label="Eliminar tipo de acuerdo" (click)="eliminar(element.idExpenseType)">
                    <mat-icon>delete</mat-icon>
                </button>
                </td>

            </ng-container>

            <ng-container matColumnDef="c5">

                <th mat-header-cell *matHeaderCellDef> Editar </th>

                <td mat-cell *matCellDef="let element"> 
                <button [routerLink]="['/expensestype/edits', element.idExpenseType]">
                    Editar
                </button>
                </td>

            </ng-container>


            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
    </div>
</div>
